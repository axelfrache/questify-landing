name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || github.repository_owner }}
  LANDING_IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME || 'questify-landing' }}
  LANDING_IMAGE: ${{ format('{0}/{1}', vars.DOCKERHUB_NAMESPACE || github.repository_owner, vars.DOCKERHUB_IMAGE_NAME || 'questify-landing') }}
  PNPM_VERSION: '10.32.1'

jobs:
  # Format & Lint stage
  format:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm lint

      - name: Check code formatting
        run: pnpm format:check

  # Build & Type Check stage
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    needs: format
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (includes TypeScript type check)
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # Build Docker Image stage
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.LANDING_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/landing-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: landing-image
          path: /tmp/landing-image.tar
          retention-days: 1

  # Deploy stage
  deploy:
    name: Deploy to Docker Hub
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Download landing image
        uses: actions/download-artifact@v4
        with:
          name: landing-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/landing-image.tar

      - name: Validate Docker Hub configuration
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || {
            echo "Missing Docker Hub username. Set GitHub variable DOCKERHUB_USERNAME (or secret DOCKERHUB_USERNAME)." >&2
            exit 1
          }
          test -n "$DOCKERHUB_TOKEN" || {
            echo "Missing Docker Hub token. Set GitHub secret DOCKERHUB_TOKEN." >&2
            exit 1
          }

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: docker push --all-tags ${{ env.LANDING_IMAGE }}

      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Landing Image:** \`${{ env.LANDING_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image successfully pushed to Docker Hub." >> $GITHUB_STEP_SUMMARY
